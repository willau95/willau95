<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&amp;family=JetBrains+Mono:wght@400;600&amp;display=swap');
    </style>
  </defs>
  
  <rect width="1200" height="300" fill="#F7F4EE"/>
  <line x1="0" y1="299" x2="1200" y2="299" stroke="#E6E1D9" stroke-width="1"/>
  <g opacity="0.03">
    <line x1="0" y1="60" x2="1200" y2="60" stroke="#18160F"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#18160F"/>
    <line x1="0" y1="180" x2="1200" y2="180" stroke="#18160F"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#18160F"/>
  </g>

  <text x="600" y="72" fill="#6B7280" font-family="JetBrains Mono, monospace" font-weight="600" font-size="13" text-anchor="middle" letter-spacing="0.15em">WEB A.0</text>

  <!-- ATLAST logo 44x44 -->
  <g transform="translate(310, 100) scale(1.375)">
    <rect width="32" height="32" rx="7" fill="#18160F"/>
    <polygon points="0,0 20,0 20,12 28,12 28,20 32,20 32,32 12,32 12,20 4,20 4,12 0,12" fill="#F7F4EE"/>
  </g>
  <text x="366" y="130" fill="#18160F" font-family="Inter, sans-serif" font-weight="700" font-size="36">ATLAST</text>

  <text x="600" y="131" fill="#C0BDB6" font-family="Inter, sans-serif" font-weight="300" font-size="32" text-anchor="middle">×</text>

  <!-- LLaChat logo (real PNG base64) -->
  <image x="630" y="100" width="44" height="44" href="data:image/png;base64,"/>
  <text x="684" y="130" fill="#18160F" font-family="Inter, sans-serif" font-weight="700" font-size="36">LLaChat</text>

  <text x="600" y="178" fill="#6B7280" font-family="Inter, sans-serif" font-weight="400" font-size="18" text-anchor="middle">The trust infrastructure for the AI agent economy.</text>

  <g transform="translate(424, 198)">
    <rect x="0" y="0" width="64" height="22" rx="4" fill="#059669" opacity="0.12"/>
    <text x="32" y="15" fill="#059669" font-family="JetBrains Mono, monospace" font-weight="600" font-size="10" text-anchor="middle">LIVE</text>
    <rect x="74" y="0" width="100" height="22" rx="4" fill="#18160F" opacity="0.06"/>
    <text x="124" y="15" fill="#6B7280" font-family="JetBrains Mono, monospace" font-weight="600" font-size="10" text-anchor="middle">Open Source</text>
    <rect x="184" y="0" width="100" height="22" rx="4" fill="#18160F" opacity="0.06"/>
    <text x="234" y="15" fill="#6B7280" font-family="JetBrains Mono, monospace" font-weight="600" font-size="10" text-anchor="middle">MIT License</text>
  </g>

  <g transform="translate(950, 85)" opacity="0.05">
    <circle cx="15" cy="15" r="8" fill="none" stroke="#18160F" stroke-width="2"/>
    <circle cx="15" cy="15" r="3" fill="#18160F"/>
    <line x1="23" y1="15" x2="47" y2="40" stroke="#18160F" stroke-width="1.5"/>
    <circle cx="55" cy="45" r="8" fill="none" stroke="#18160F" stroke-width="2"/>
    <circle cx="55" cy="45" r="3" fill="#18160F"/>
    <line x1="63" y1="45" x2="87" y2="22" stroke="#18160F" stroke-width="1.5"/>
    <circle cx="95" cy="18" r="8" fill="none" stroke="#18160F" stroke-width="2"/>
    <circle cx="95" cy="18" r="3" fill="#18160F"/>
    <circle cx="35" cy="75" r="5" fill="none" stroke="#18160F" stroke-width="1.2"/>
    <line x1="40" y1="75" x2="65" y2="63" stroke="#18160F" stroke-width="1.2"/>
    <circle cx="70" cy="60" r="5" fill="none" stroke="#18160F" stroke-width="1.2"/>
