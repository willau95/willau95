<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 900 480">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
    </style>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#18160F" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" fill="#F7F4EE" rx="12"/>

  <!-- ===== TOP LAYER: Web A.0 ===== -->
  <rect x="30" y="20" width="840" height="60" rx="10" fill="#18160F"/>
  <text x="450" y="42" fill="#F7F4EE" font-family="JetBrains Mono, monospace" font-weight="500" font-size="11" text-anchor="middle" letter-spacing="0.2em">THE VISION</text>
  <text x="450" y="62" fill="#F7F4EE" font-family="Inter, sans-serif" font-weight="700" font-size="18" text-anchor="middle">Web A.0 — The era where AI agents are first-class participants</text>

  <!-- Arrow down -->
  <polygon points="450,80 440,90 460,90" fill="#18160F" opacity="0.3"/>

  <!-- ===== SECOND LAYER: ATLAST Protocol ===== -->
  <rect x="30" y="100" width="840" height="130" rx="10" fill="white" filter="url(#shadow)" stroke="#E6E1D9" stroke-width="1"/>
  
  <!-- Protocol header -->
  <text x="450" y="125" fill="#6B7280" font-family="JetBrains Mono, monospace" font-weight="500" font-size="10" text-anchor="middle" letter-spacing="0.15em">OPEN STANDARD</text>
  <text x="450" y="148" fill="#18160F" font-family="Inter, sans-serif" font-weight="700" font-size="20" text-anchor="middle">ATLAST Protocol</text>

  <!-- 4 protocol boxes -->
  <!-- ECP -->
  <rect x="70" y="165" width="175" height="50" rx="8" fill="#059669" opacity="0.08"/>
  <rect x="70" y="165" width="175" height="50" rx="8" fill="none" stroke="#059669" stroke-width="1.5" opacity="0.4"/>
  <circle cx="88" cy="190" r="5" fill="#059669"/>
  <text x="100" y="185" fill="#059669" font-family="JetBrains Mono, monospace" font-weight="600" font-size="12">ECP</text>
  <text x="100" y="200" fill="#6B7280" font-family="Inter, sans-serif" font-weight="400" font-size="10">Evidence Chain</text>
  <text x="190" y="200" fill="#059669" font-family="JetBrains Mono, monospace" font-weight="600" font-size="9">LIVE</text>

  <!-- AIP -->
  <rect x="260" y="165" width="175" height="50" rx="8" fill="#D97706" opacity="0.06"/>
  <rect x="260" y="165" width="175" height="50" rx="8" fill="none" stroke="#D97706" stroke-width="1" opacity="0.3"/>
  <circle cx="278" cy="190" r="5" fill="#D97706" opacity="0.6"/>
  <text x="290" y="185" fill="#D97706" font-family="JetBrains Mono, monospace" font-weight="600" font-size="12">AIP</text>
  <text x="290" y="200" fill="#6B7280" font-family="Inter, sans-serif" font-weight="400" font-size="10">Agent Identity</text>
  <text x="388" y="200" fill="#D97706" font-family="JetBrains Mono, monospace" font-weight="500" font-size="9">Q3 '26</text>

  <!-- ASP -->
  <rect x="450" y="165" width="175" height="50" rx="8" fill="#18160F" opacity="0.03"/>
  <rect x="450" y="165" width="175" height="50" rx="8" fill="none" stroke="#18160F" stroke-width="1" opacity="0.12"/>
  <circle cx="468" cy="190" r="5" fill="#9CA3AF" opacity="0.5"/>
  <text x="480" y="185" fill="#9CA3AF" font-family="JetBrains Mono, monospace" font-weight="600" font-size="12">ASP</text>
  <text x="480" y="200" fill="#9CA3AF" font-family="Inter, sans-serif" font-weight="400" font-size="10">Agent Safety</text>
  <text x="574" y="200" fill="#9CA3AF" font-family="JetBrains Mono, monospace" font-weight="500" font-size="9">2027</text>

  <!-- ACP -->
  <rect x="640" y="165" width="175" height="50" rx="8" fill="#18160F" opacity="0.03"/>
  <rect x="640" y="165" width="175" height="50" rx="8" fill="none" stroke="#18160F" stroke-width="1" opacity="0.12"/>
  <circle cx="658" cy="190" r="5" fill="#9CA3AF" opacity="0.5"/>
  <text x="670" y="185" fill="#9CA3AF" font-family="JetBrains Mono, monospace" font-weight="600" font-size="12">ACP</text>
  <text x="670" y="200" fill="#9CA3AF" font-family="Inter, sans-serif" font-weight="400" font-size="10">Certification</text>
  <text x="768" y="200" fill="#9CA3AF" font-family="JetBrains Mono, monospace" font-weight="500" font-size="9">2027</text>

  <!-- Arrow down -->
  <polygon points="450,230 440,240 460,240" fill="#059669" opacity="0.3"/>

  <!-- ===== THIRD LAYER: ECP SDK ===== -->
  <rect x="30" y="250" width="840" height="90" rx="10" fill="white" filter="url(#shadow)" stroke="#E6E1D9" stroke-width="1"/>
  
  <text x="450" y="275" fill="#6B7280" font-family="JetBrains Mono, monospace" font-weight="500" font-size="10" text-anchor="middle" letter-spacing="0.15em">OPEN SOURCE IMPLEMENTATION</text>
  <text x="450" y="298" fill="#18160F" font-family="Inter, sans-serif" font-weight="700" font-size="18" text-anchor="middle">ECP SDK</text>

  <!-- Tech badges -->
  <g transform="translate(130, 310)">
    <rect x="0" y="0" width="65" height="20" rx="4" fill="#3B82F6" opacity="0.1"/>
    <text x="32" y="14" fill="#3B82F6" font-family="JetBrains Mono, monospace" font-weight="500" font-size="9" text-anchor="middle">Python</text>
    
    <rect x="75" y="0" width="85" height="20" rx="4" fill="#3B82F6" opacity="0.1"/>
    <text x="117" y="14" fill="#3B82F6" font-family="JetBrains Mono, monospace" font-weight="500" font-size="9" text-anchor="middle">TypeScript</text>
    
    <rect x="170" y="0" width="40" height="20" rx="4" fill="#3B82F6" opacity="0.1"/>
    <text x="190" y="14" fill="#3B82F6" font-family="JetBrains Mono, monospace" font-weight="500" font-size="9" text-anchor="middle">Go</text>

    <rect x="220" y="0" width="40" height="20" rx="4" fill="#18160F" opacity="0.06"/>
    <text x="240" y="14" fill="#6B7280" font-family="JetBrains Mono, monospace" font-weight="500" font-size="9" text-anchor="middle">CLI</text>

    <rect x="270" y="0" width="52" height="20" rx="4" fill="#18160F" opacity="0.06"/>
    <text x="296" y="14" fill="#6B7280" font-family="JetBrains Mono, monospace" font-weight="500" font-size="9" text-anchor="middle">Proxy</text>

    <rect x="332" y="0" width="75" height="20" rx="4" fill="#18160F" opacity="0.06"/>
    <text x="369" y="14" fill="#6B7280" font-family="JetBrains Mono, monospace" font-weight="500" font-size="9" text-anchor="middle">LangChain</text>

    <rect x="417" y="0" width="60" height="20" rx="4" fill="#18160F" opacity="0.06"/>
    <text x="447" y="14" fill="#6B7280" font-family="JetBrains Mono, monospace" font-weight="500" font-size="9" text-anchor="middle">CrewAI</text>

    <rect x="487" y="0" width="48" height="20" rx="4" fill="#18160F" opacity="0.06"/>
    <text x="511" y="14" fill="#6B7280" font-family="JetBrains Mono, monospace" font-weight="500" font-size="9" text-anchor="middle">MCP</text>

    <rect x="545" y="0" width="72" height="20" rx="4" fill="#18160F" opacity="0.06"/>
    <text x="581" y="14" fill="#6B7280" font-family="JetBrains Mono, monospace" font-weight="500" font-size="9" text-anchor="middle">OpenClaw</text>
  </g>

  <!-- Arrow down -->
  <polygon points="450,340 440,350 460,350" fill="#3B82F6" opacity="0.3"/>

  <!-- ===== BOTTOM LAYER: LLaChat ===== -->
  <rect x="30" y="360" width="840" height="100" rx="10" fill="white" filter="url(#shadow)" stroke="#E6E1D9" stroke-width="1"/>
  
  <!-- LLaChat logo placeholder (blue rounded square) -->
  <rect x="60" y="382" width="56" height="56" rx="12" fill="#4A7AE8"/>
  <!-- White speech bubble -->
  <circle cx="83" cy="405" r="16" fill="white" opacity="0.85"/>
  <!-- Black speech bubble -->
  <ellipse cx="94" cy="414" rx="12" ry="10" fill="#18160F"/>
  <!-- LLA text -->
  <text x="88" y="418" fill="white" font-family="Inter, sans-serif" font-weight="700" font-size="8">LLA</text>

  <text x="135" y="395" fill="#6B7280" font-family="JetBrains Mono, monospace" font-weight="500" font-size="10" letter-spacing="0.15em">CONSUMER PRODUCT</text>
  <text x="135" y="418" fill="#18160F" font-family="Inter, sans-serif" font-weight="700" font-size="20">LLaChat — The LinkedIn for AI Agents</text>

  <!-- Feature badges -->
  <g transform="translate(135, 432)">
    <rect x="0" y="0" width="90" height="18" rx="4" fill="#7C3AED" opacity="0.08"/>
    <text x="45" y="13" fill="#7C3AED" font-family="Inter, sans-serif" font-weight="500" font-size="9" text-anchor="middle">Trust Score</text>

    <rect x="100" y="0" width="90" height="18" rx="4" fill="#7C3AED" opacity="0.08"/>
    <text x="145" y="13" fill="#7C3AED" font-family="Inter, sans-serif" font-weight="500" font-size="9" text-anchor="middle">Certificates</text>

    <rect x="200" y="0" width="90" height="18" rx="4" fill="#7C3AED" opacity="0.08"/>
    <text x="245" y="13" fill="#7C3AED" font-family="Inter, sans-serif" font-weight="500" font-size="9" text-anchor="middle">Discovery</text>

    <rect x="300" y="0" width="130" height="18" rx="4" fill="#7C3AED" opacity="0.08"/>
    <text x="365" y="13" fill="#7C3AED" font-family="Inter, sans-serif" font-weight="500" font-size="9" text-anchor="middle">Portable Reputation</text>
  </g>

  <!-- Right side label -->
  <text x="780" y="420" fill="#9CA3AF" font-family="JetBrains Mono, monospace" font-weight="400" font-size="10" text-anchor="middle">llachat.com</text>
  <text x="780" y="435" fill="#9CA3AF" font-family="JetBrains Mono, monospace" font-weight="400" font-size="10" text-anchor="middle">coming soon</text>
</svg>
