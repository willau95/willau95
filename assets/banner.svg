<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&amp;family=JetBrains+Mono:wght@400;600&amp;display=swap');
    </style>
  </defs>
  
  <!-- Background: weba0 warm white -->
  <rect width="1200" height="300" fill="#F7F4EE"/>
  
  <!-- Subtle border bottom -->
  <line x1="0" y1="299" x2="1200" y2="299" stroke="#E6E1D9" stroke-width="1"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="60" x2="1200" y2="60" stroke="#18160F" stroke-width="1"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#18160F" stroke-width="1"/>
    <line x1="0" y1="180" x2="1200" y2="180" stroke="#18160F" stroke-width="1"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#18160F" stroke-width="1"/>
  </g>

  <!-- Logo mark -->
  <g transform="translate(80, 85) scale(3.5)">
    <rect width="32" height="32" rx="7" fill="#18160F"/>
    <polygon points="0,0 20,0 20,12 28,12 28,20 32,20 32,32 12,32 12,20 4,20 4,12 0,12" fill="#F7F4EE"/>
  </g>

  <!-- Web A.0 small label -->
  <text x="210" y="107" fill="#6B7280" font-family="JetBrains Mono, monospace" font-weight="600" font-size="13" letter-spacing="0.15em">WEB A.0</text>

  <!-- ATLAST × LLaChat -->
  <text x="210" y="148" fill="#18160F" font-family="Inter, sans-serif" font-weight="700" font-size="44" letter-spacing="0.01em">ATLAST</text>
  <text x="426" y="148" fill="#9CA3AF" font-family="Inter, sans-serif" font-weight="300" font-size="44" letter-spacing="0.01em">×</text>
  <text x="462" y="148" fill="#18160F" font-family="Inter, sans-serif" font-weight="700" font-size="44" letter-spacing="0.01em">LLaChat</text>

  <!-- Tagline -->
  <text x="210" y="185" fill="#6B7280" font-family="Inter, sans-serif" font-weight="400" font-size="20">The trust infrastructure for the AI agent economy.</text>

  <!-- Badges -->
  <g transform="translate(210, 205)">
    <rect x="0" y="0" width="64" height="22" rx="4" fill="#059669" opacity="0.12"/>
    <text x="32" y="15" fill="#059669" font-family="JetBrains Mono, monospace" font-weight="600" font-size="10" text-anchor="middle">LIVE</text>
    
    <rect x="74" y="0" width="100" height="22" rx="4" fill="#18160F" opacity="0.06"/>
    <text x="124" y="15" fill="#6B7280" font-family="JetBrains Mono, monospace" font-weight="600" font-size="10" text-anchor="middle">Open Source</text>
    
    <rect x="184" y="0" width="100" height="22" rx="4" fill="#18160F" opacity="0.06"/>
    <text x="234" y="15" fill="#6B7280" font-family="JetBrains Mono, monospace" font-weight="600" font-size="10" text-anchor="middle">MIT License</text>
    
    <rect x="294" y="0" width="88" height="22" rx="4" fill="#18160F" opacity="0.06"/>
    <text x="338" y="15" fill="#6B7280" font-family="JetBrains Mono, monospace" font-weight="600" font-size="10" text-anchor="middle">On-Chain</text>
  </g>

  <!-- Right side: abstract evidence chain -->
  <g transform="translate(820, 55)" opacity="0.07">
    <circle cx="20" cy="20" r="12" fill="none" stroke="#18160F" stroke-width="2.5"/>
    <circle cx="20" cy="20" r="4" fill="#18160F"/>
    <line x1="32" y1="20" x2="68" y2="60" stroke="#18160F" stroke-width="2"/>
    <circle cx="80" cy="68" r="12" fill="none" stroke="#18160F" stroke-width="2.5"/>
    <circle cx="80" cy="68" r="4" fill="#18160F"/>
    <line x1="92" y1="68" x2="128" y2="38" stroke="#18160F" stroke-width="2"/>
    <circle cx="140" cy="30" r="12" fill="none" stroke="#18160F" stroke-width="2.5"/>
    <circle cx="140" cy="30" r="4" fill="#18160F"/>
    <line x1="152" y1="30" x2="188" y2="80" stroke="#18160F" stroke-width="2"/>
    <circle cx="200" cy="88" r="12" fill="none" stroke="#18160F" stroke-width="2.5"/>
    <circle cx="200" cy="88" r="4" fill="#18160F"/>
    <line x1="212" y1="88" x2="248" y2="48" stroke="#18160F" stroke-width="2"/>
    <circle cx="260" cy="40" r="12" fill="none" stroke="#18160F" stroke-width="2.5"/>
    <circle cx="260" cy="40" r="4" fill="#18160F"/>
    <circle cx="50" cy="130" r="8" fill="none" stroke="#18160F" stroke-width="1.5"/>
    <line x1="58" y1="130" x2="112" y2="110" stroke="#18160F" stroke-width="1.5"/>
    <circle cx="120" cy="106" r="8" fill="none" stroke="#18160F" stroke-width="1.5"/>
    <line x1="128" y1="106" x2="182" y2="140" stroke="#18160F" stroke-width="1.5"/>
    <circle cx="190" cy="144" r="8" fill="none" stroke="#18160F" stroke-width="1.5"/>
    <line x1="198" y1="144" x2="242" y2="120" stroke="#18160F" stroke-width="1.5"/>
    <circle cx="250" cy="116" r="8" fill="none" stroke="#18160F" stroke-width="1.5"/>
  </g>
</svg>
